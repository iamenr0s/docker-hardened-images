name: pr
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# tool versions installed from SHA-pinned installer scripts (see Install security tools)
env:
  SYFT_VERSION: v1.46.0
  SYFT_INSTALL_SHA: b15c5dbfe2bb21c9d73002c1056a829c8c411c75
  GRYPE_VERSION: v0.115.0
  GRYPE_INSTALL_SHA: fa8b7e2a528cf1f8b098123f256c61db9e5df69c
  TRIVY_VERSION: v0.72.0
  TRIVY_INSTALL_SHA: 8a32853686209a428179bb3a1688802b25691564
  CST_VERSION: v1.22.1

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: hadolint (debian)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: images/debian/Dockerfile
          config: .hadolint.yaml
      - name: hadolint (ubuntu)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: images/ubuntu/Dockerfile
          config: .hadolint.yaml
      - name: hadolint (fedora)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: images/fedora/Dockerfile
          config: .hadolint.yaml
      - name: hadolint (almalinux)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: images/almalinux/Dockerfile
          config: .hadolint.yaml
      - name: hadolint (rockylinux)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: images/rockylinux/Dockerfile
          config: .hadolint.yaml
      - name: shellcheck
        run: |
          sudo apt-get update -q && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh images/common/*.sh

  build-scan:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { distro: debian, version: "12", flavor: full }
          - { distro: debian, version: "12", flavor: micro }
          - { distro: debian, version: "13", flavor: full }
          - { distro: debian, version: "13", flavor: micro }
          - { distro: ubuntu, version: "22.04", flavor: full }
          - { distro: ubuntu, version: "22.04", flavor: micro }
          - { distro: ubuntu, version: "24.04", flavor: full }
          - { distro: ubuntu, version: "24.04", flavor: micro }
          - { distro: fedora, version: "44", flavor: full }
          - { distro: fedora, version: "44", flavor: micro }
          - { distro: fedora, version: "43", flavor: full }
          - { distro: fedora, version: "43", flavor: micro }
          - { distro: fedora, version: "42", flavor: full }
          - { distro: fedora, version: "42", flavor: micro }
          - { distro: almalinux, version: "8", flavor: full }
          - { distro: almalinux, version: "8", flavor: micro }
          - { distro: almalinux, version: "9", flavor: full }
          - { distro: almalinux, version: "9", flavor: micro }
          - { distro: almalinux, version: "10", flavor: full }
          - { distro: almalinux, version: "10", flavor: micro }
          - { distro: rockylinux, version: "8", flavor: full }
          - { distro: rockylinux, version: "8", flavor: micro }
          - { distro: rockylinux, version: "9", flavor: full }
          - { distro: rockylinux, version: "9", flavor: micro }
          - { distro: rockylinux, version: "10", flavor: full }
          - { distro: rockylinux, version: "10", flavor: micro }
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build (amd64, load)
        run: |
          source "images/${{ matrix.distro }}/${{ matrix.version }}/env"
          docker buildx build \
            --platform linux/amd64 \
            --target ${{ matrix.flavor }} \
            --build-arg SUITE="${SUITE:-}" \
            --build-arg VERSION="${VERSION}" \
            --build-arg SNAPSHOT="${SNAPSHOT:-}" \
            --load \
            --tag local/${{ matrix.distro }}-hardened:${{ matrix.version }}-${{ matrix.flavor }} \
            --file images/${{ matrix.distro }}/Dockerfile images

      - name: Install security tools (SHA-pinned installers, pinned versions)
        run: |
          curl -sSfL "https://raw.githubusercontent.com/anchore/syft/${SYFT_INSTALL_SHA}/install.sh" | sudo sh -s -- -b /usr/local/bin "${SYFT_VERSION}"
          curl -sSfL "https://raw.githubusercontent.com/anchore/grype/${GRYPE_INSTALL_SHA}/install.sh" | sudo sh -s -- -b /usr/local/bin "${GRYPE_VERSION}"
          curl -sSfL "https://raw.githubusercontent.com/aquasecurity/trivy/${TRIVY_INSTALL_SHA}/contrib/install.sh" | sudo sh -s -- -b /usr/local/bin "${TRIVY_VERSION}"
          sudo curl -sSfL -o /usr/local/bin/container-structure-test \
            "https://github.com/GoogleContainerTools/container-structure-test/releases/download/${CST_VERSION}/container-structure-test-linux-amd64" \
            && sudo chmod +x /usr/local/bin/container-structure-test

      - name: Structure tests
        run: |
          container-structure-test test \
            --image local/${{ matrix.distro }}-hardened:${{ matrix.version }}-${{ matrix.flavor }} \
            --config tests/${{ matrix.distro }}/${{ matrix.flavor }}.yaml

      - name: SBOM
        run: scripts/sbom.sh local/${{ matrix.distro }}-hardened:${{ matrix.version }}-${{ matrix.flavor }} sbom

      - name: Vulnerability gate (grype + trivy)
        run: scripts/scan.sh local/${{ matrix.distro }}-hardened:${{ matrix.version }}-${{ matrix.flavor }}

      - name: Dockle (CIS lint)
        # micro only: 'full' runs as root by design (build-stage flavor),
        # which permanently trips CIS-DI-0001 at WARN threshold
        if: matrix.flavor == 'micro'
        uses: erzz/dockle-action@e8a7c41f36f1236ca3282b298d425ffbfdb2e922 # v1
        with:
          image: local/${{ matrix.distro }}-hardened:${{ matrix.version }}-${{ matrix.flavor }}
          exit-code: 1
          failure-threshold: WARN
