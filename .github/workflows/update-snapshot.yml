name: update-snapshot
on:
  schedule:
    - cron: "0 1 * * *"   # daily 01:00 UTC, before the nightly rebuild
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Bump pinned deb-family snapshots (Debian + Ubuntu)
        id: bump
        run: |
          scripts/update-snapshot.sh
          echo "snapshot=$(grep -oP '^SNAPSHOT=\K.*' images/debian/12/env)" >> "$GITHUB_OUTPUT"

      - name: Open PR
        id: pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # BOT_TOKEN (fine-grained PAT, see README "CI setup") lets the
          # bot PR trigger pr.yml — GITHUB_TOKEN-created PRs never do
          # (recursion guard). Falls back to GITHUB_TOKEN if unset.
          token: ${{ secrets.BOT_TOKEN || github.token }}
          branch: bot/snapshot-bump
          title: "chore: bump deb-family snapshot to ${{ steps.bump.outputs.snapshot }}"
          commit-message: "chore: bump deb-family snapshot to ${{ steps.bump.outputs.snapshot }}"
          labels: dependencies, security
          body: |
            Automated bump of the pinned snapshot timestamp across every
            env file that declares one (Debian: snapshot.debian.org,
            Ubuntu: snapshot.ubuntu.com). RPM-family images (Fedora,
            AlmaLinux, RockyLinux) have no historical pin and are
            unaffected — see docs/ADDING_A_DISTRO.md.

            Merging this PR is how upstream security patches reach the
            published images. The PR pipeline (build + structure tests +
            grype/trivy gate) must pass before merge.

            Tip: with branch protection requiring the pr checks + Code
            Owner review, enabling auto-merge is safe here — this PR only
            touches env files (not code-owned), so patched images ship
            without manual intervention while code changes still need review.

      # Arms auto-merge; GitHub merges once the required checks on main's
      # branch protection pass. release.yml explicitly skips the resulting
      # push (see its 'chore: bump deb-family snapshot to' guard) — the
      # 02:17 UTC nightly rebuild publishes the bumped snapshot instead,
      # avoiding a same-day duplicate publish.
      - name: Enable auto-merge
        if: steps.pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN || github.token }}
          PR: ${{ steps.pr.outputs.pull-request-number }}
        run: gh pr merge --squash --auto "$PR"
