name: release
on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  id-token: write   # keyless cosign signing

# serialize publishes: shares the group with nightly.yml so a nightly rebuild
# can never race a snapshot-bump release pushing the same tags
concurrency:
  group: release-publish
  cancel-in-progress: false

env:
  DOCKERHUB_REPO: docker.io/${{ vars.DOCKERHUB_ORG }}/debian-hardened
  QUAY_REPO: quay.io/${{ vars.QUAY_ORG }}/debian-hardened
  SYFT_VERSION: v1.46.0
  SYFT_INSTALL_SHA: b15c5dbfe2bb21c9d73002c1056a829c8c411c75
  GRYPE_VERSION: v0.115.0
  GRYPE_INSTALL_SHA: fa8b7e2a528cf1f8b098123f256c61db9e5df69c
  TRIVY_VERSION: v0.72.0
  TRIVY_INSTALL_SHA: 8a32853686209a428179bb3a1688802b25691564

jobs:
  release:
    runs-on: ubuntu-latest
    # scope registry/signing secrets to this environment and restrict its
    # deployment branch policy to main (see README "CI setup"); optionally
    # add required reviewers there to manually gate every publish
    environment: release
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version: ["12", "13"]
        flavor: [full, micro]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login Quay
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Install syft, grype & trivy (SHA-pinned installers, pinned versions)
        run: |
          curl -sSfL "https://raw.githubusercontent.com/anchore/syft/${SYFT_INSTALL_SHA}/install.sh" | sudo sh -s -- -b /usr/local/bin "${SYFT_VERSION}"
          curl -sSfL "https://raw.githubusercontent.com/anchore/grype/${GRYPE_INSTALL_SHA}/install.sh" | sudo sh -s -- -b /usr/local/bin "${GRYPE_VERSION}"
          curl -sSfL "https://raw.githubusercontent.com/aquasecurity/trivy/${TRIVY_INSTALL_SHA}/contrib/install.sh" | sudo sh -s -- -b /usr/local/bin "${TRIVY_VERSION}"
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Compute tags
        id: tags
        run: |
          source images/debian/${{ matrix.version }}/env
          echo "suite=${SUITE}" >> "$GITHUB_OUTPUT"
          echo "snapshot=${SNAPSHOT:-}" >> "$GITHUB_OUTPUT"
          # reproducible layer timestamps derived from the pinned snapshot
          if [ -n "${SNAPSHOT:-}" ]; then
            EPOCH=$(date -u -d "${SNAPSHOT:0:8} ${SNAPSHOT:9:2}:${SNAPSHOT:11:2}:${SNAPSHOT:13:2}" +%s)
            echo "SOURCE_DATE_EPOCH=${EPOCH}" >> "$GITHUB_ENV"
          fi
          TAGS="${DOCKERHUB_REPO}:${{ matrix.version }}-${{ matrix.flavor }},${QUAY_REPO}:${{ matrix.version }}-${{ matrix.flavor }}"
          if [ "${{ matrix.flavor }}" = "micro" ]; then
            TAGS="${TAGS},${DOCKERHUB_REPO}:${{ matrix.version }},${QUAY_REPO}:${{ matrix.version }}"
            for T in ${EXTRA_TAGS:-}; do
              TAGS="${TAGS},${DOCKERHUB_REPO}:${T},${QUAY_REPO}:${T}"
            done
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Pre-push vulnerability gate (amd64, full scan.sh gate)
        run: |
          docker buildx build --platform linux/amd64 \
            --target ${{ matrix.flavor }} \
            --build-arg SUITE="${{ steps.tags.outputs.suite }}" \
            --build-arg SNAPSHOT="${{ steps.tags.outputs.snapshot }}" \
            --load --tag gate/debian-hardened:amd64 \
            --file images/debian/Dockerfile images
          scripts/scan.sh gate/debian-hardened:amd64

      - name: Pre-push vulnerability gate (arm64)
        run: |
          docker buildx build --platform linux/arm64 \
            --target ${{ matrix.flavor }} \
            --build-arg SUITE="${{ steps.tags.outputs.suite }}" \
            --build-arg SNAPSHOT="${{ steps.tags.outputs.snapshot }}" \
            --load --tag gate/debian-hardened:arm64 \
            --file images/debian/Dockerfile images
          grype gate/debian-hardened:arm64 \
            --config policies/grype.yaml --fail-on high --only-fixed

      - name: Build & push multi-arch
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: images
          file: images/debian/Dockerfile
          target: ${{ matrix.flavor }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            SUITE=${{ steps.tags.outputs.suite }}
            SNAPSHOT=${{ steps.tags.outputs.snapshot }}
          push: true
          provenance: mode=max
          tags: ${{ steps.tags.outputs.tags }}

      - name: SBOM from pushed digest
        run: |
          scripts/sbom.sh "${DOCKERHUB_REPO}@${{ steps.push.outputs.digest }}" sbom
          cp sbom/*.spdx.json sbom/image.spdx.json

      - name: Sign + attest (both registries)
        run: |
          scripts/sign.sh "${DOCKERHUB_REPO}@${{ steps.push.outputs.digest }}" sbom/image.spdx.json
          scripts/sign.sh "${QUAY_REPO}@${{ steps.push.outputs.digest }}" sbom/image.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ matrix.version }}-${{ matrix.flavor }}
          path: sbom/
