name: release
on:
  push:
    branches: [main]
    # Skip publishing a full signed release for changes that cannot affect
    # the built images. scripts/, policies/, images/ and this workflow keep
    # triggering. Explicit ignore list (not an allow-list) so new files
    # fail safe: anything unlisted still triggers a release.
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "LICENSE"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - ".gitignore"
      - ".hadolint.yaml"     # lint config; enforced in pr.yml only
      - "Makefile"           # local-dev entry point; release.yml calls scripts/ directly
      - "tests/**"           # structure tests; run in pr.yml, not here
      - ".github/CODEOWNERS"
      - ".github/dependabot.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/pr.yml"
      - ".github/workflows/nightly.yml"
      - ".github/workflows/rescan.yml"
      - ".github/workflows/quay-pulls-badge.yml"
      - ".github/workflows/update-snapshot.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  id-token: write   # keyless cosign signing

# serialize publishes: shares the group with nightly.yml so a nightly rebuild
# can never race a snapshot-bump release pushing the same tags
concurrency:
  group: release-publish
  cancel-in-progress: false

env:
  SYFT_VERSION: v1.46.0
  SYFT_INSTALL_SHA: b15c5dbfe2bb21c9d73002c1056a829c8c411c75
  GRYPE_VERSION: v0.115.0
  GRYPE_INSTALL_SHA: fa8b7e2a528cf1f8b098123f256c61db9e5df69c
  TRIVY_VERSION: v0.72.0
  TRIVY_INSTALL_SHA: 8a32853686209a428179bb3a1688802b25691564

jobs:
  release:
    # Skip when this run IS the automated snapshot-bump merge: the 02:17 UTC
    # nightly rebuild (workflow_call, not a 'push' event) already republishes
    # with the just-bumped snapshot a short while later, so triggering here
    # too would publish everything twice with identical content. Only
    # matches the exact commit-message prefix update-snapshot.yml's PR title
    # uses — any other push to main (code, Dockerfile, manual env edits)
    # runs normally.
    if: >-
      github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, 'chore: bump deb-family snapshot to ')
    # Ubuntu matrix entries set `runner: ubuntu-24.04-arm` (native arm64,
    # free for public repos) so their arm64 leg runs real hardware instead
    # of qemu-aarch64 user-mode emulation, which segfaults intermittently
    # running glibc's ldconfig postinst under emulation on amd64 hosts
    # (docker/buildx#1170; confirmed non-deterministic across qemu versions
    # here, so pinning qemu could not fix it — see setup-qemu-action below).
    # Everything else keeps the default amd64 runner.
    runs-on: ${{ matrix.runner || 'ubuntu-latest' }}
    # scope registry/signing secrets to this environment and restrict its
    # deployment branch policy to main (see README "CI setup"); optionally
    # add required reviewers there to manually gate every publish
    environment: release
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - { distro: debian, version: "12", flavor: full }
          - { distro: debian, version: "12", flavor: micro }
          - { distro: debian, version: "13", flavor: full }
          - { distro: debian, version: "13", flavor: micro }
          - { distro: ubuntu, version: "22.04", flavor: full, runner: ubuntu-24.04-arm }
          - { distro: ubuntu, version: "22.04", flavor: micro, runner: ubuntu-24.04-arm }
          - { distro: ubuntu, version: "24.04", flavor: full, runner: ubuntu-24.04-arm }
          - { distro: ubuntu, version: "24.04", flavor: micro, runner: ubuntu-24.04-arm }
          - { distro: fedora, version: "44", flavor: full }
          - { distro: fedora, version: "44", flavor: micro }
          - { distro: fedora, version: "43", flavor: full }
          - { distro: fedora, version: "43", flavor: micro }
          - { distro: fedora, version: "42", flavor: full }
          - { distro: fedora, version: "42", flavor: micro }
          - { distro: almalinux, version: "8", flavor: full }
          - { distro: almalinux, version: "8", flavor: micro }
          - { distro: almalinux, version: "9", flavor: full }
          - { distro: almalinux, version: "9", flavor: micro }
          - { distro: almalinux, version: "10", flavor: full }
          - { distro: almalinux, version: "10", flavor: micro }
          - { distro: rockylinux, version: "8", flavor: full }
          - { distro: rockylinux, version: "8", flavor: micro }
          - { distro: rockylinux, version: "9", flavor: full }
          - { distro: rockylinux, version: "9", flavor: micro }
          - { distro: rockylinux, version: "10", flavor: full }
          - { distro: rockylinux, version: "10", flavor: micro }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          # Pin the emulator to a known-good build (still worth pinning for
          # reproducibility). NOTE: this does NOT fix the aarch64 ldconfig
          # segfault (LP#2072564 class) — that bug is a host/qemu-user
          # interaction that reproduced identically on both qemu 10.2.3 and
          # this 8.1.5 pin, non-deterministically. Ubuntu's arm64 leg was
          # moved to a native runner instead (see matrix `runner:` above);
          # this pin still applies to the other distros' emulated arm64 leg.
          image: docker.io/tonistiigi/binfmt:qemu-v8.1.5@sha256:2d2918e86e5327d0661f7083d67a95280b0f7be8f77ed79a8418f81d7d90ce6f
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login Docker Hub
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4.5.1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login Quay
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4.5.1
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Install syft, grype & trivy (SHA-pinned installers, pinned versions)
        run: |
          curl -sSfL "https://raw.githubusercontent.com/anchore/syft/${SYFT_INSTALL_SHA}/install.sh" | sudo sh -s -- -b /usr/local/bin "${SYFT_VERSION}"
          curl -sSfL "https://raw.githubusercontent.com/anchore/grype/${GRYPE_INSTALL_SHA}/install.sh" | sudo sh -s -- -b /usr/local/bin "${GRYPE_VERSION}"
          curl -sSfL "https://raw.githubusercontent.com/aquasecurity/trivy/${TRIVY_INSTALL_SHA}/contrib/install.sh" | sudo sh -s -- -b /usr/local/bin "${TRIVY_VERSION}"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Compute tags
        id: tags
        run: |
          source "images/${{ matrix.distro }}/${{ matrix.version }}/env"
          echo "suite=${SUITE:-}" >> "$GITHUB_OUTPUT"
          echo "release_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "snapshot=${SNAPSHOT:-}" >> "$GITHUB_OUTPUT"
          # reproducible layer timestamps derived from the pinned snapshot
          if [ -n "${SNAPSHOT:-}" ]; then
            EPOCH=$(date -u -d "${SNAPSHOT:0:8} ${SNAPSHOT:9:2}:${SNAPSHOT:11:2}:${SNAPSHOT:13:2}" +%s)
            echo "SOURCE_DATE_EPOCH=${EPOCH}" >> "$GITHUB_ENV"
          fi
          DOCKERHUB_REPO="docker.io/${{ vars.DOCKERHUB_ORG }}/${{ matrix.distro }}-hardened"
          QUAY_REPO="quay.io/${{ vars.QUAY_ORG }}/${{ matrix.distro }}-hardened"
          echo "dockerhub_repo=${DOCKERHUB_REPO}" >> "$GITHUB_OUTPUT"
          echo "quay_repo=${QUAY_REPO}" >> "$GITHUB_OUTPUT"
          TAGS="${DOCKERHUB_REPO}:${{ matrix.version }}-${{ matrix.flavor }},${QUAY_REPO}:${{ matrix.version }}-${{ matrix.flavor }}"
          if [ "${{ matrix.flavor }}" = "micro" ]; then
            TAGS="${TAGS},${DOCKERHUB_REPO}:${{ matrix.version }},${QUAY_REPO}:${{ matrix.version }}"
            for T in ${EXTRA_TAGS:-}; do
              TAGS="${TAGS},${DOCKERHUB_REPO}:${T},${QUAY_REPO}:${T}"
            done
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Pre-push vulnerability gate (amd64, full scan.sh gate)
        run: |
          docker buildx build --platform linux/amd64 \
            --target ${{ matrix.flavor }} \
            --build-arg SUITE="${{ steps.tags.outputs.suite }}" \
            --build-arg VERSION="${{ steps.tags.outputs.release_version }}" \
            --build-arg SNAPSHOT="${{ steps.tags.outputs.snapshot }}" \
            --load --tag gate/${{ matrix.distro }}-hardened:amd64 \
            --file images/${{ matrix.distro }}/Dockerfile images
          scripts/scan.sh gate/${{ matrix.distro }}-hardened:amd64

      - name: Pre-push vulnerability gate (arm64)
        run: |
          docker buildx build --platform linux/arm64 \
            --target ${{ matrix.flavor }} \
            --build-arg SUITE="${{ steps.tags.outputs.suite }}" \
            --build-arg VERSION="${{ steps.tags.outputs.release_version }}" \
            --build-arg SNAPSHOT="${{ steps.tags.outputs.snapshot }}" \
            --load --tag gate/${{ matrix.distro }}-hardened:arm64 \
            --file images/${{ matrix.distro }}/Dockerfile images
          grype gate/${{ matrix.distro }}-hardened:arm64 \
            --config policies/grype.yaml --fail-on high --only-fixed

      - name: Build & push multi-arch
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: images
          file: images/${{ matrix.distro }}/Dockerfile
          target: ${{ matrix.flavor }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            SUITE=${{ steps.tags.outputs.suite }}
            VERSION=${{ steps.tags.outputs.release_version }}
            SNAPSHOT=${{ steps.tags.outputs.snapshot }}
          push: true
          provenance: mode=max
          tags: ${{ steps.tags.outputs.tags }}

      - name: SBOM from pushed digest
        run: |
          scripts/sbom.sh "${{ steps.tags.outputs.dockerhub_repo }}@${{ steps.push.outputs.digest }}" sbom
          cp sbom/*.spdx.json sbom/image.spdx.json

      - name: Sign + attest (both registries)
        run: |
          scripts/sign.sh "${{ steps.tags.outputs.dockerhub_repo }}@${{ steps.push.outputs.digest }}" sbom/image.spdx.json
          scripts/sign.sh "${{ steps.tags.outputs.quay_repo }}@${{ steps.push.outputs.digest }}" sbom/image.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.distro }}-${{ matrix.version }}-${{ matrix.flavor }}
          path: sbom/
