name: nightly-rebuild
on:
  schedule:
    - cron: "17 2 * * *"   # daily 02:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# NOTE: no top-level concurrency here. release.yml's own
# "release-publish" group applies when it runs as a reusable workflow,
# so nightly rebuilds already serialize against snapshot-bump releases.
# Declaring the same group here deadlocks the run at startup (caller
# holds the group the callee then waits on) — GitHub fails it with
# zero jobs.

jobs:
  rebuild:
    # With snapshot pinning, security patches arrive via the daily
    # snapshot-bump PR (update-snapshot.yml). This nightly rebuild keeps
    # signatures/attestations fresh. Note: it re-pushes the tags; it does
    # NOT compare digests against the previous release, so it assumes the
    # pinned build reproduces (reproducibility is not verified here).
    uses: ./.github/workflows/release.yml
    secrets: inherit
