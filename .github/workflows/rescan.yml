name: rescan-published
on:
  schedule:
    - cron: "45 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  GRYPE_VERSION: v0.115.0
  GRYPE_INSTALL_SHA: fa8b7e2a528cf1f8b098123f256c61db9e5df69c

jobs:
  rescan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # image must be a real axis (not include:): include entries only
        # layer extra keys onto the registry axis, overwriting each other,
        # so only the last distro/tag pair ever ran.
        image:
          # bare version tags alias micro; suite/codename tags share these digests
          - { distro: debian, tag: "12" }
          - { distro: debian, tag: "12-full" }
          - { distro: debian, tag: "13" }
          - { distro: debian, tag: "13-full" }
          - { distro: ubuntu, tag: "22.04" }
          - { distro: ubuntu, tag: "22.04-full" }
          - { distro: ubuntu, tag: "24.04" }
          - { distro: ubuntu, tag: "24.04-full" }
          - { distro: fedora, tag: "44" }
          - { distro: fedora, tag: "44-full" }
          - { distro: fedora, tag: "43" }
          - { distro: fedora, tag: "43-full" }
          - { distro: fedora, tag: "42" }
          - { distro: fedora, tag: "42-full" }
          - { distro: almalinux, tag: "8" }
          - { distro: almalinux, tag: "8-full" }
          - { distro: almalinux, tag: "9" }
          - { distro: almalinux, tag: "9-full" }
          - { distro: almalinux, tag: "10" }
          - { distro: almalinux, tag: "10-full" }
          - { distro: rockylinux, tag: "8" }
          - { distro: rockylinux, tag: "8-full" }
          - { distro: rockylinux, tag: "9" }
          - { distro: rockylinux, tag: "9-full" }
          - { distro: rockylinux, tag: "10" }
          - { distro: rockylinux, tag: "10-full" }
        registry: [docker.io, quay.io]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install grype (SHA-pinned installer, pinned version)
        run: curl -sSfL "https://raw.githubusercontent.com/anchore/grype/${GRYPE_INSTALL_SHA}/install.sh" | sudo sh -s -- -b /usr/local/bin "${GRYPE_VERSION}"

      - name: Resolve repo
        id: repo
        run: |
          if [ "${{ matrix.registry }}" = "docker.io" ]; then
            echo "ref=docker.io/${{ vars.DOCKERHUB_ORG }}/${{ matrix.image.distro }}-hardened" >> "$GITHUB_OUTPUT"
          else
            echo "ref=quay.io/${{ vars.QUAY_ORG }}/${{ matrix.image.distro }}-hardened" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan published image
        id: scan
        continue-on-error: true
        run: |
          grype "${{ steps.repo.outputs.ref }}:${{ matrix.image.tag }}" \
            --config policies/grype.yaml --fail-on high --only-fixed \
            -o json > grype.json

      # Shields endpoint JSON for the README table. Only the quay.io leg
      # writes it: both registries hold the same digest, counts are identical.
      # .matches is already the gate's population (fixable, not policy-ignored).
      - name: Generate CVE badge JSON
        if: matrix.registry == 'quay.io'
        run: |
          jq -e . grype.json >/dev/null 2>&1 || { echo "no valid grype report; keeping previous badge"; exit 0; }
          crit=$(jq '[.matches[]? | select(.vulnerability.severity == "Critical")] | length' grype.json)
          high=$(jq '[.matches[]? | select(.vulnerability.severity == "High")] | length' grype.json)
          med=$(jq '[.matches[]? | select(.vulnerability.severity == "Medium")] | length' grype.json)
          total=$(jq '.matches | length' grype.json)
          if [ "$total" -eq 0 ]; then
            msg="0 fixable"; color="brightgreen"
          else
            msg="${total} fixable"
            if [ $((crit + high)) -gt 0 ]; then color="red"
            elif [ "$med" -gt 0 ]; then color="orange"
            else color="yellow"; fi
          fi
          mkdir -p badge
          jq -n --arg msg "$msg" --arg color "$color" \
            '{schemaVersion: 1, label: "CVEs", message: $msg, color: $color}' \
            > "badge/cve-${{ matrix.image.distro }}-${{ matrix.image.tag }}.json"

      - name: Upload badge artifact
        if: matrix.registry == 'quay.io'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cve-badge-${{ matrix.image.distro }}-${{ matrix.image.tag }}
          path: badge/
          if-no-files-found: ignore

      - name: Open issue on new findings
        if: steps.scan.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            let report = {};
            try {
              report = JSON.parse(fs.readFileSync('grype.json', 'utf8'));
            } catch (e) {
              core.warning(`grype failed without a report (registry/network error?): ${e}`);
              return;
            }
            const vulns = (report.matches || [])
              .filter(m => ['High','Critical'].includes(m.vulnerability.severity))
              .map(m => `- ${m.vulnerability.id} (${m.vulnerability.severity}) in ${m.artifact.name} ${m.artifact.version}`)
              .join('\n');
            if (!vulns) return;  // scan failed for a non-finding reason
            // registry-agnostic title: both registries hold the same digest,
            // so findings dedupe into one issue per distro+tag
            const title = `CVEs found in ${{ matrix.image.distro }}-hardened:${{ matrix.image.tag }}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'security'
            });
            if (!open.data.some(i => i.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, labels: ['security'],
                body: `Fixable High/Critical vulnerabilities detected (${{ steps.repo.outputs.ref }}:${{ matrix.image.tag }}):\n\n${vulns}\n\nNightly rebuild should resolve these; investigate if they persist.`
              });
            }

  # Single commit for all badge files on the orphan "badges" branch (never
  # main: pushes to main trigger release.yml). Committing on top of the
  # branch preserves files owned by other badge workflows (quay-pulls-badge).
  publish-badges:
    needs: rescan
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: badges
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cve-badge-*
          merge-multiple: true
          path: badges/
      - name: Commit updated badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/
          git diff --cached --quiet && { echo "badges unchanged"; exit 0; }
          git commit -m "chore: update CVE badges"
          git push origin badges || { git pull --rebase origin badges && git push origin badges; }
