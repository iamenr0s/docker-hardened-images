schemaVersion: 2.0.0
fileExistenceTests:
  - name: apt available
    path: /usr/bin/apt-get
    shouldExist: true
  - name: shell available
    path: /bin/bash
    shouldExist: true
  - name: no curl
    path: /usr/bin/curl
    shouldExist: false
  - name: CA certificates present
    path: /etc/ssl/certs/ca-certificates.crt
    shouldExist: true
commandTests:
  - name: recommends disabled
    command: "grep"
    args: ["-r", "Install-Recommends", "/etc/apt/apt.conf.d/01-hardened"]
    expectedOutput: [".*false.*"]
  - name: no setuid binaries
    command: "sh"
    args: ["-c", "find / -xdev -perm /6000 -type f | wc -l"]
    # anchored: expectedOutput entries are regexes, bare "0" would match "10"
    expectedOutput: ["^0\\s*$"]
  - name: root account locked
    command: "sh"
    args: ["-c", "grep -c '^root:[*!]' /etc/shadow"]
    expectedOutput: ["^1\\s*$"]
